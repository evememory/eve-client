name: release-eve-client

on:
  workflow_dispatch:
  push:
    tags:
      - "eve-memory-client@*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run tests
        run: |
          mkdir -p "$RUNNER_TEMP/pytest-tmp"
          chmod 700 "$RUNNER_TEMP/pytest-tmp"
          NO_COLOR=1 TERM=dumb TMPDIR="$RUNNER_TEMP/pytest-tmp" uv run --with pytest --with pytest-cov pytest --cov=eve_client --cov-report=term-missing -q tests

  build-python:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build Python artifacts
        run: |
          uv build .

      - name: Check Python artifacts
        run: |
          uvx twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: eve-memory-client-python
          path: dist/*

  build-binaries:
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build standalone binaries
        run: |
          bash scripts/build-eve-client-release.sh

      - uses: actions/upload-artifact@v4
        with:
          name: eve-memory-client-binaries-${{ matrix.os }}
          path: release/eve-memory-client/artifacts/*

  publish-python:
    needs: build-python
    if: startsWith(github.ref, 'refs/tags/eve-memory-client@') && github.repository == 'evememory/eve-client'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - uses: actions/download-artifact@v4
        with:
          name: eve-memory-client-python
          path: dist

      - name: Verify release metadata
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          if data["project"]["name"] != "eve-memory-client":
              raise SystemExit("pyproject project.name must be eve-memory-client")
          version = data["project"]["version"]
          expected_ref = f"refs/tags/eve-memory-client@{version}"
          if os.environ["GITHUB_REF"] != expected_ref:
              raise SystemExit(f"GITHUB_REF must match {expected_ref}")
          if os.environ["GITHUB_REPOSITORY"] != "evememory/eve-client":
              raise SystemExit("GITHUB_REPOSITORY must be evememory/eve-client")
          PY

      - name: Publish eve-memory-client to PyPI
        run: bash scripts/publish-eve-client-pypi.sh --publish --skip-build --dist-dir dist
